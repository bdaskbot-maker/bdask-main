<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="200" fill="rgba(0,184,148,0.08)"/>
  <circle cx="100" cy="550" r="150" fill="rgba(0,206,201,0.06)"/>

  <!-- Bangladesh flag colors accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo/Icon area -->
  <circle cx="600" cy="180" r="60" fill="rgba(0,184,148,0.15)" stroke="url(#accent)" stroke-width="2"/>
  <text x="600" y="198" font-family="Arial, sans-serif" font-size="48" fill="#00b894" text-anchor="middle">🤖</text>

  <!-- Main title (Bengali) -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle">
    বিডিআস্ক | BdAsk
  </text>

  <!-- Subtitle (Bengali) -->
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.7)" text-anchor="middle">
    বাংলাদেশের AI সার্চ ইঞ্জিন
  </text>

  <!-- Feature pills -->
  <rect x="160" y="410" width="140" height="40" rx="20" fill="rgba(0,184,148,0.2)"/>
  <text x="230" y="436" font-family="Arial, sans-serif" font-size="16" fill="#00b894" text-anchor="middle">🤖 AI চ্যাট</text>

  <rect x="320" y="410" width="140" height="40" rx="20" fill="rgba(0,184,148,0.2)"/>
  <text x="390" y="436" font-family="Arial, sans-serif" font-size="16" fill="#00b894" text-anchor="middle">🏏 ক্রিকেট</text>

  <rect x="480" y="410" width="120" height="40" rx="20" fill="rgba(0,184,148,0.2)"/>
  <text x="540" y="436" font-family="Arial, sans-serif" font-size="16" fill="#00b894" text-anchor="middle">📰 খবর</text>

  <rect x="620" y="410" width="140" height="40" rx="20" fill="rgba(0,184,148,0.2)"/>
  <text x="690" y="436" font-family="Arial, sans-serif" font-size="16" fill="#00b894" text-anchor="middle">🕌 নামাজ</text>

  <rect x="780" y="410" width="140" height="40" rx="20" fill="rgba(0,184,148,0.2)"/>
  <text x="850" y="436" font-family="Arial, sans-serif" font-size="16" fill="#00b894" text-anchor="middle">🌤️ আবহাওয়া</text>

  <!-- Bottom tagline -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    সম্পূর্ণ ফ্রি • বাংলায় • সাইন আপ ছাড়া
  </text>

  <!-- URL -->
  <rect x="480" y="550" width="240" height="44" rx="22" fill="url(#accent)"/>
  <text x="600" y="578" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">
    bdask.com
  </text>

  <!-- Flag -->
  <text x="1140" y="600" font-family="Arial, sans-serif" font-size="32">🇧🇩</text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
