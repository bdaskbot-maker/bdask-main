# ============================================
# BdAsk - Docker Compose
# ============================================
# Usage: docker-compose up -d
# ============================================

version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bdask-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
    depends_on:
      - mongodb
    networks:
      - bdask-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: bdask-web
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - bdask-network

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: bdask-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - bdask-mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=bdask
    networks:
      - bdask-network

volumes:
  bdask-mongo-data:
    driver: local

networks:
  bdask-network:
    driver: bridge
